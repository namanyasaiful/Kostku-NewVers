<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kostku - Penghuni</title>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/page.css" />
    <link rel="stylesheet" href="../css/table.css" />
  </head>
  <body>
    <div class="main">
      <!-- SIDEBAR -->
      <div id="sidebar"></div>
      <div id="overlay" class="overlay"></div>

      <div class="main-content">
        <!-- TOPBAR -->
        <div id="topbar"></div>

        <!-- PENGHUNI PAGE -->
        <main class="page penghuni-page" id="content">
          <!-- HEADER PAGE -->
          <header class="page-header">
            <div class="page-title">
              <h1>Data Penghuni</h1>
              <span class="page-description"
                >Kelola data penghuni dan akun login</span
              >
            </div>
            <button class="btn btn-primary" id="addPenghuniBtn">
              Tambah Penghuni
            </button>
          </header>

          <!-- SEARCH BAR -->
          <div class="search-box">
            <img
              src="../img/search-icon.png"
              alt="Search Icon"
              class="search-icon"
            />
            <div class="searchbar">
              <input type="text" placeholder="Cari nama atau nomor kamar" />
            </div>
          </div>

          <!-- CONTENT -->
          <div class="table-container">
            <div class="table-wrapper">
              <table class="table">
                <thead>
                  <tr>
                    <th>Kode Penghuni</th>
                    <th>No HP</th>
                    <th>Nama Lengkap</th>
                    <th>Kamar</th>
                    <th>Tanggal Masuk</th>
                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>P001</td>
                    <td>Andi Saputra</td>
                    <td class="text-custom">081234567892</td>
                    <td class="text-custom">KM001</td>
                    <td class="text-custom">08/04/2026</td>
                    <td class="aksi">
                      <div class="actions-button">
                        <a href="#">
                          <img src="../img/select-icon.png" alt="select" />
                        </a>

                        <a href="#">
                          <img src="../img/edit-icon.png" alt="edit" />
                        </a>

                        <a href="#">
                          <img src="../img/delete-icon.png" alt="delete" />
                        </a>
                      </div>
                    </td>
                  </tr>
                  <tr>
                    <td>P002</td>
                    <td>Tono Sukamto</td>
                    <td class="text-custom">081234567892</td>
                    <td class="text-custom">KM002</td>
                    <td class="text-custom">08/04/2026</td>
                    <td class="aksi">
                      <div class="actions-button">
                        <a href="#">
                          <img src="../img/select-icon.png" alt="select" />
                        </a>

                        <a href="#">
                          <img src="../img/edit-icon.png" alt="edit" />
                        </a>

                        <a href="#">
                          <img src="../img/delete-icon.png" alt="delete" />
                        </a>
                      </div>
                    </td>
                  </tr>
                  <tr>
                    <td>P003</td>
                    <td>Saifulloh Fattah</td>
                    <td class="text-custom">081234567890</td>
                    <td class="text-custom">KM003</td>
                    <td class="text-custom">08/04/2026</td>
                    <td class="aksi">
                      <div class="actions-button">
                        <a href="#">
                          <img src="../img/select-icon.png" alt="select" />
                        </a>

                        <a href="#">
                          <img src="../img/edit-icon.png" alt="edit" />
                        </a>

                        <a href="#">
                          <img src="../img/delete-icon.png" alt="delete" />
                        </a>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- SCRIPT -->
    <script src="../js/main.js"></script>
  </body>
</html>
