<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kostku - Penghuni</title>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/page.css" />
  </head>
  <body>
    <div class="main">
      <!-- SIDEBAR -->
      <div id="sidebar"></div>
      <div id="overlay" class="overlay"></div>

      <div class="main-content">
        <!-- TOPBAR -->
        <div id="topbar"></div>

        <!-- PENGHUNI PAGE -->
        <main class="page penghuni-page" id="content">
          <!-- HEADER PAGE -->
          <header class="page-header">
            <div class="page-title">
              <h1>Data Penghuni</h1>
              <span class="page-description"
                >Kelola data penghuni dan akun login</span
              >
            </div>
            <button class="btn btn-primary" id="addPenghuniBtn">
              Tambah Penghuni
            </button>
          </header>

          <!-- SEARCH BAR -->
          <div class="search-box">
            <img
              src="../img/search-icon.png"
              alt="Search Icon"
              class="search-icon"
            />
            <div class="searchbar">
              <input type="text" placeholder="Cari nama atau nomor kamar" />
            </div>
          </div>

          <!-- CONTENT -->
        </main>
      </div>
    </div>

    <!-- SCRIPT -->
    <script src="../js/main.js"></script>
  </body>
</html>
